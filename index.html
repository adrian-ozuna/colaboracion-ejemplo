<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Names</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      color: #1a1a1a;
    }
    h1 {
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      padding: 12px 16px;
      margin: 8px 0;
      background: #f5f5f5;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>List of Names</h1>
  <ul>
    <li>Adrian Ozuna</li>
    <li>Shantall Duval</li>
  </ul>
</body>
</html>
