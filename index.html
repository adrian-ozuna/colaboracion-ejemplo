<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Names</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      color: #1a1a1a;
    }
    h1 {
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      padding: 12px 16px;
      margin: 8px 0;
      background: #f5f5f5;
      border-radius: 6px;
    }
    .yelaisa-name {
      text-decoration: underline;
      text-decoration-color: #ff69b4;
      text-underline-offset: 3px;
    }
    .heart-i {
      display: inline-block;
      position: relative;
    }
    .heart-i::after {
      content: '♥';
      position: absolute;
      top: -0.3em;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.55em;
      color: #ff69b4;
      line-height: 1;
    }
    .pixel-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: #00c853;
      background: #0d0d0d;
      border-radius: 4px;
      padding: 14px 16px;
      text-shadow:
        2px 2px 0px #007a33,
        4px 4px 0px #004d1f;
      image-rendering: pixelated;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>List of Names</h1>
  <ul>
    <li>Adrian Ozuna</li>
    <li class="pixel-name">Amanda Burgos</li>
    <li class="yelaisa-name">Yela<span class="heart-i">ı</span>sa la mejor de esta clase</li>
    <li>Marcos</li>
    <li>Shantall Duval</li>
  </ul>
</body>
</html>
